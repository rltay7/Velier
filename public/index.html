<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velier — Access everything. Own nothing.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Switzer:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --obsidian: #0d0b09;
      --obsidian-2: #131109;
      --obsidian-3: #1a1713;
      --obsidian-4: #22201a;
      --obsidian-5: #2e2b24;
      --gold: hsl(41, 62%, 60%);
      --gold-dim: hsl(41, 40%, 45%);
      --gold-light: hsl(41, 70%, 75%);
      --champagne: #e8dfc8;
      --champagne-dim: #9e9484;
      --white: #f5f0e8;
      --border: rgba(200, 180, 130, 0.12);
      --border-hover: rgba(200, 180, 130, 0.28);
      --overlay: rgba(13, 11, 9, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--obsidian);
      color: var(--champagne);
      font-family: 'Switzer', -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TYPOGRAPHY ── */
    .display { font-family: 'Cormorant Garamond', Georgia, serif; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; }
    h1 { font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.05; letter-spacing: -0.01em; }
    h2 { font-size: clamp(1.75rem, 3.5vw, 2.75rem); line-height: 1.15; }
    h3 { font-size: clamp(1.25rem, 2vw, 1.6rem); line-height: 1.25; }
    p { color: var(--champagne-dim); }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--obsidian); }
    ::-webkit-scrollbar-thumb { background: var(--obsidian-5); border-radius: 3px; }

    /* ── LAYOUT ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 clamp(1rem, 4vw, 3rem); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

    /* ── NAVIGATION ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
      padding: 1.25rem clamp(1rem, 4vw, 3rem);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,7,10,0.55);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid rgba(200,155,50,0.08);
      transition: opacity 0.4s ease;
    }
    .nav.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.75rem;
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 0.7px #ffffff;
      text-stroke: 0.7px #ffffff;
    }
    .nav-logo svg { width: 32px; height: 32px; }
    .nav-links {
      display: flex; align-items: center; gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none; color: var(--champagne-dim);
      font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--champagne); }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
    .nav-cta, button.nav-cta {
      padding: 0.55rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--champagne);
      font-family: 'Switzer', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: inline-flex; align-items: center;
      border-radius: 0;
    }
    .nav-cta:hover { background: var(--obsidian-4); border-color: var(--gold-dim); color: var(--gold-light); }
    .nav-cta.primary { background: var(--gold); border-color: var(--gold); color: var(--obsidian); font-weight: 600; }
    .nav-cta.primary:hover { background: var(--gold-light); }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 22px; height: 1px; background: var(--champagne); transition: all 0.3s; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem 2rem;
      font-family: 'Switzer', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s; text-decoration: none;
      border: 1px solid transparent;
    }
    .btn-gold { background: var(--gold); color: var(--obsidian); font-weight: 600; border-color: var(--gold); }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,160,60,0.25); }
    .btn-outline { background: transparent; color: var(--champagne); border-color: var(--border-hover); }
    .btn-outline:hover { border-color: var(--gold-dim); color: var(--gold-light); background: rgba(200,160,60,0.05); }
    .btn-ghost { background: transparent; color: var(--champagne-dim); border-color: transparent; }
    .btn-ghost:hover { color: var(--champagne); }
    .btn-danger { background: transparent; color: #e05555; border-color: rgba(220,80,80,0.3); }
    .btn-danger:hover { background: rgba(220,80,80,0.1); }
    .btn-sm { padding: 0.5rem 1.25rem; font-size: 0.75rem; }
    .btn-lg { padding: 1rem 2.5rem; font-size: 0.9rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── CARDS ── */
    .card {
      background: var(--obsidian-2);
      border: 1px solid var(--border);
      transition: all 0.3s;
      cursor: pointer;
    }
    .card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .card-image {
      aspect-ratio: 4/5;
      background: var(--obsidian-3);
      overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .card-image svg { width: 48px; height: 48px; opacity: 0.2; }
    .card-image .wishlist-btn {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: rgba(13,11,9,0.8); border: 1px solid var(--border);
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .card-image .wishlist-btn:hover, .card-image .wishlist-btn.active { border-color: var(--gold-dim); }
    .card-image .wishlist-btn.active svg { fill: var(--gold); stroke: var(--gold); }
    .card-image .category-badge {
      position: absolute; bottom: 0.75rem; left: 0.75rem;
      background: rgba(13,11,9,0.85); backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 0.25rem 0.6rem;
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--champagne-dim);
    }
    .card-body { padding: 1rem 1.1rem 1.25rem; }
    .card-brand { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--champagne); margin-bottom: 0.35rem; line-height: 1.3; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 0.6rem; }
    .card-price { font-size: 0.9rem; color: var(--champagne); }
    .card-price span { color: var(--champagne-dim); font-size: 0.75rem; }
    .card-retail { font-size: 0.68rem; color: var(--champagne-dim); letter-spacing: 0.04em; margin-top: 0.2rem; }
    .card-rating { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--champagne-dim); }
    .card-rating .star { color: var(--gold); font-size: 0.7rem; }

    /* ── LISTING ITEM VISUALS ── */
    .item-visual {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; user-select: none;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center;
      padding: 8rem 2rem 5rem;
      position: relative; overflow: hidden;
      background: var(--obsidian);
    }
    .hero-video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0.45; pointer-events: none;
    }
    .hero-video-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(13,11,9,0.35) 0%, rgba(13,11,9,0.55) 50%, rgba(13,11,9,0.85) 100%);
      pointer-events: none;
    }
    .hero > *:not(.hero-video):not(.hero-video-overlay) { position: relative; z-index: 2; }
    .hero-eyebrow {
      font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: ''; display: block; width: 40px; height: 1px; background: var(--gold-dim);
    }
    .hero h1 { max-width: 900px; margin-bottom: 1.25rem; }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-sub { max-width: 500px; margin: 0 auto 2.5rem; font-size: 1rem; color: var(--champagne-dim); line-height: 1.7; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .hero-scroll {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--champagne-dim); animation: bounce 2s infinite;
      margin-top: 2.5rem;
    }
    .hero-scroll svg { width: 18px; height: 18px; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ── SECTIONS ── */
    .section { padding: 5rem 0; }
    .section-sm { padding: 3rem 0; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .section-header h2 { margin-bottom: 0.75rem; }
    .section-header p { max-width: 480px; margin: 0 auto; font-size: 0.95rem; }
    .divider { height: 1px; background: var(--border); margin: 0; }

    /* ── CATEGORY TILES ── */
    .category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
    .category-tile {
      aspect-ratio: 1;
      background: var(--obsidian-3);
      border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem;
      cursor: pointer; transition: all 0.3s; text-decoration: none; position: relative; overflow: hidden;
    }
    .category-tile::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(200,155,50,0.08) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s;
    }
    .category-tile:hover::before { opacity: 1; }
    .category-tile:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .category-tile .cat-icon { width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; color: var(--champagne-dim); transition: color 0.3s; }
    .category-tile:hover .cat-icon { color: var(--champagne); }
    .category-tile .cat-label { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--champagne-dim); }
    .category-tile:hover .cat-label { color: var(--champagne); }


    /* ── TRADE PAGE ── */
    .trade-hero { padding: 5rem 0 3rem; background: linear-gradient(180deg, var(--obsidian-2) 0%, var(--obsidian) 100%); border-bottom: 1px solid var(--border); text-align: center; }
    .trade-hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 300; color: var(--champagne); margin-bottom: 0.75rem; }
    .trade-hero p { color: var(--champagne-dim); max-width: 520px; margin: 0 auto 2rem; font-size: 0.9rem; line-height: 1.7; }
    .trade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .trade-card { background: var(--obsidian-2); border: 1px solid var(--border); padding: 1.5rem; transition: border-color 0.2s, transform 0.2s; }
    .trade-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .trade-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .trade-badge { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold-dim); padding: 0.2rem 0.55rem; }
    .trade-item-img { width: 100%; height: 180px; background: var(--obsidian-3); background-size: cover; background-position: center; margin-bottom: 1rem; }
    .trade-item-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: var(--champagne); margin-bottom: 0.25rem; }
    .trade-item-meta { font-size: 0.75rem; color: var(--champagne-dim); margin-bottom: 0.75rem; }
    .trade-value { font-size: 0.8rem; color: var(--champagne-dim); margin-bottom: 1rem; }
    .trade-value strong { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
    .trade-seeking { font-size: 0.75rem; color: var(--champagne-dim); padding: 0.6rem 0.75rem; border: 1px solid var(--border); margin-bottom: 1rem; line-height: 1.5; }
    .trade-seeking span { color: var(--champagne); }
    .trade-fee-info { background: var(--obsidian-3); border: 1px solid var(--border); padding: 1.25rem 1.5rem; margin-bottom: 2.5rem; }
    .trade-fee-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; }
    .trade-fee-item .tfi-val { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold); }
    .trade-fee-item .tfi-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--champagne-dim); margin-top: 0.25rem; }

    /* ── TRUST & SECURITY ── */
    .trust-section { padding: 4rem 0; background: var(--obsidian-2); border-top: 1px solid var(--border); }
    .trust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .trust-card { padding: 1.5rem; border: 1px solid var(--border); background: var(--obsidian); }
    .trust-icon { font-size: 1.4rem; margin-bottom: 0.75rem; opacity: 0.7; }
    .trust-card h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--champagne); margin-bottom: 0.4rem; font-weight: 400; }
    .trust-card p { font-size: 0.78rem; color: var(--champagne-dim); line-height: 1.65; }

    /* ── INSURANCE ── */
    .insurance-box { margin-top: 1.25rem; border: 1px solid var(--border); }
    .insurance-box-title { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--champagne-dim); padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.4rem; }
    .insurance-tier { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem 0.85rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .insurance-tier:last-child { border-bottom: none; }
    .insurance-tier:hover { background: var(--obsidian-3); }
    .insurance-tier input[type=radio] { accent-color: var(--gold); margin-top: 2px; flex-shrink: 0; }
    .insurance-tier-body { flex: 1; }
    .insurance-tier-name { font-size: 0.82rem; color: var(--champagne); margin-bottom: 0.15rem; }
    .insurance-tier-desc { font-size: 0.72rem; color: var(--champagne-dim); line-height: 1.5; }
    .insurance-tier-price { font-size: 0.78rem; color: var(--gold); margin-top: 0.2rem; }

    /* ── ID VERIFICATION BADGE ── */
    .verified-id-badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold-dim); padding: 0.2rem 0.6rem; margin-bottom: 1rem; }

    @media (max-width: 600px) {
      .trade-fee-grid { grid-template-columns: 1fr; }
      .trust-grid { grid-template-columns: 1fr 1fr; }
    }


    /* ── SPLASH SCREEN ── */
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #08070b;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1s cubic-bezier(0.4,0,0.2,1), transform 1s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .splash.exiting { opacity: 0; transform: scale(1.03); pointer-events: none; }

    /* Canvas shimmer sits behind everything */
    .splash-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Icon container */
    .splash-icon-wrap {
      position: relative;
      width: 220px; height: 220px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2.8rem;
    }

    /* Outer ring — slow pulse */
    .splash-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(200,155,50,0.12);
      animation: ringPulse 4s ease-in-out infinite;
    }
    .splash-ring-2 {
      position: absolute; inset: 16px;
      border-radius: 50%;
      border: 1px solid rgba(200,155,50,0.07);
      animation: ringPulse 4s ease-in-out infinite 0.6s;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.015); }
    }

    /* Tick marks around the circle */
    .splash-ticks {
      position: absolute; inset: 0;
      animation: tickRotate 40s linear infinite;
    }
    @keyframes tickRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* The main eye SVG */
    .splash-eye {
      position: relative; z-index: 2;
      filter: drop-shadow(0 0 30px rgba(200,155,50,0.2)) drop-shadow(0 0 8px rgba(200,155,50,0.1));
      animation: eyeGlow 3s ease-in-out infinite;
    }
    @keyframes eyeGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(200,155,50,0.15)) drop-shadow(0 0 6px rgba(200,155,50,0.08)); }
      50%       { filter: drop-shadow(0 0 40px rgba(200,155,50,0.3))  drop-shadow(0 0 14px rgba(200,155,50,0.18)); }
    }

    /* Text */
    .splash-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 700;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 0.6px rgba(255,255,255,0.85);
      margin-bottom: 0.5rem;
      opacity: 0; animation: splashUp 1.2s ease forwards 0.4s;
    }
    .splash-tagline {
      font-size: 0.63rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(200,155,50,0.55);
      margin-bottom: 3.5rem;
      opacity: 0; animation: splashUp 1.2s ease forwards 0.75s;
    }
    @keyframes splashUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Enter button */
    .splash-enter {
      position: relative;
      display: inline-flex; align-items: center; gap: 1rem;
      font-size: 0.63rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(200,155,50,0.75);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0; animation: splashUp 1.2s ease forwards 1.2s;
      transition: color 0.3s;
    }
    .splash-enter::before, .splash-enter::after {
      content: '';
      display: block;
      height: 1px;
      background: rgba(200,155,50,0.3);
      transition: width 0.4s ease, background 0.3s;
      width: 32px;
    }
    .splash-enter:hover { color: rgba(200,155,50,1); }
    .splash-enter:hover::before, .splash-enter:hover::after {
      width: 52px;
      background: rgba(200,155,50,0.7);
    }

    /* Page entry */
    .page-entering { animation: pageReveal 0.9s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes pageReveal {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

        /* ── BRAND MARQUEE ── */
    .brand-strip {
      padding: 2rem 0;
      background: var(--obsidian-2);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .brand-marquee {
      display: flex; gap: 4rem;
      animation: marquee 30s linear infinite;
      white-space: nowrap; width: max-content;
    }
    .brand-marquee span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--champagne-dim); padding: 0 2rem;
    }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── HOW IT WORKS ── */
    .hiw-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    .hiw-step { text-align: center; padding: 2.5rem 1.5rem; background: var(--obsidian-2); border: 1px solid var(--border); }
    .hiw-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem; font-weight: 300; color: var(--border-hover);
      line-height: 1; margin-bottom: 1rem;
    }
    .hiw-step h3 { margin-bottom: 0.5rem; font-size: 1.2rem; }
    .hiw-step p { font-size: 0.88rem; line-height: 1.65; }

    /* ── LENDER CTA ── */
    .lender-cta {
      padding: 6rem clamp(1rem, 4vw, 3rem);
      background: var(--obsidian-2);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
    }
    .lender-cta h2 { margin-bottom: 1rem; }
    .lender-cta p { margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.7; }
    .earnings-preview {
      background: var(--obsidian-3); border: 1px solid var(--border);
      padding: 2rem;
    }
    .earnings-preview h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--champagne); margin-bottom: 1.25rem; font-weight: 400; }
    .earnings-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    .earnings-row:last-child { border-bottom: none; }
    .earnings-row .label { font-size: 0.8rem; color: var(--champagne-dim); }
    .earnings-row .value { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); }

    /* ── BROWSE PAGE ── */
    .browse-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; align-items: start; }
    .filter-sidebar { position: sticky; top: 5rem; }
    .filter-section { margin-bottom: 2rem; }
    .filter-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--champagne-dim); margin-bottom: 0.75rem; display: block; }
    .filter-option {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0;
      cursor: pointer; font-size: 0.85rem; color: var(--champagne-dim);
      transition: color 0.2s; user-select: none;
    }
    .filter-option:hover { color: var(--champagne); }
    .filter-option input { display: none; }
    .filter-check {
      width: 14px; height: 14px; border: 1px solid var(--border-hover);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.2s;
    }
    .filter-check.checked { background: var(--gold); border-color: var(--gold); }
    .filter-check.checked::after { content: '✓'; font-size: 9px; color: var(--obsidian); }
    .browse-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .browse-count { font-size: 0.8rem; color: var(--champagne-dim); }
    .sort-select {
      background: var(--obsidian-3); border: 1px solid var(--border);
      color: var(--champagne); padding: 0.5rem 1rem; font-size: 0.78rem;
      font-family: 'Switzer', sans-serif; cursor: pointer; outline: none;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .chip {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(200,160,60,0.1); border: 1px solid rgba(200,160,60,0.25);
      padding: 0.25rem 0.6rem; font-size: 0.72rem; letter-spacing: 0.06em;
      color: var(--gold-light); cursor: pointer;
    }
    .chip:hover { background: rgba(200,160,60,0.18); }
    .chip-x { font-size: 0.85rem; opacity: 0.7; }
    .category-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
    .cat-tab {
      padding: 0.65rem 1.25rem; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; color: var(--champagne-dim); border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'Switzer', sans-serif;
    }
    .cat-tab:hover { color: var(--champagne); }
    .cat-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── LISTING DETAIL ── */
    .listing-layout { display: grid; grid-template-columns: 1fr 420px; gap: 3rem; align-items: start; }
    .gallery-main { aspect-ratio: 4/5; background: var(--obsidian-2); border: 1px solid var(--border); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; }
    .gallery-thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .gallery-thumb { aspect-ratio: 1; background: var(--obsidian-2); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.2s; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .gallery-thumb.active { border-color: var(--gold-dim); }
    .listing-detail-right { position: sticky; top: 5rem; }
    .listing-brand { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .listing-title-h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 3vw, 2.4rem); margin-bottom: 0.75rem; font-weight: 400; line-height: 1.2; }
    .listing-rating { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--champagne-dim); margin-bottom: 1.5rem; }
    .stars { color: var(--gold); letter-spacing: 0.05em; }
    .listing-attrs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1.5rem; }
    .attr-pill {
      background: var(--obsidian-3); border: 1px solid var(--border);
      padding: 0.6rem 0.875rem;
    }
    .attr-pill .attr-name { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--champagne-dim); margin-bottom: 0.15rem; }
    .attr-pill .attr-val { font-size: 0.88rem; color: var(--champagne); }
    .pricing-box { background: var(--obsidian-3); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1.25rem; }
    .pricing-box h4 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--champagne); margin-bottom: 1rem; font-weight: 400; letter-spacing: 0.05em; }
    .pricing-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.45rem 0; font-size: 0.85rem; }
    .pricing-row .pl { color: var(--champagne-dim); }
    .pricing-row .pv { color: var(--champagne); }
    .pricing-total { border-top: 1px solid var(--border); margin-top: 0.5rem; padding-top: 0.75rem; }
    .pricing-total .pl { font-weight: 500; color: var(--champagne); }
    .pricing-total .pv { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold); }
    .rate-schedule { margin-bottom: 1.25rem; border: 1px solid var(--border); }
    .rate-schedule-title { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--champagne-dim); padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--border); }
    .rate-row { display: flex; justify-content: space-between; align-items: center; padding: 0.55rem 0.85rem; border-bottom: 1px solid var(--border); }
    .rate-row:last-child { border-bottom: none; }
    .rate-row-label { font-size: 0.82rem; color: var(--champagne-dim); }
    .rate-row-price { font-size: 1.15rem; color: var(--champagne); font-family: 'Cormorant Garamond', serif; font-weight: 500; }
    .retail-value { font-size: 0.72rem; color: var(--champagne-dim); letter-spacing: 0.06em; margin-bottom: 1rem; }
    .retail-value strong { color: var(--champagne); }
    .rate-row-save { font-size: 0.68rem; color: var(--gold); letter-spacing: 0.05em; margin-left: 0.5rem; }
    .date-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
    .date-input { background: var(--obsidian-4); border: 1px solid var(--border); padding: 0.65rem 0.75rem; color: var(--champagne); font-family: 'Switzer', sans-serif; font-size: 0.82rem; width: 100%; outline: none; transition: border-color 0.2s; }
    .date-input:focus { border-color: var(--gold-dim); }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    .owner-card { border-top: 1px solid var(--border); padding-top: 1.25rem; margin-top: 1.5rem; display: flex; align-items: center; gap: 0.875rem; }
    .owner-avatar { width: 44px; height: 44px; background: var(--obsidian-5); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; color: var(--champagne-dim); letter-spacing: 0.05em; flex-shrink: 0; }
    .owner-info h5 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; color: var(--champagne); }
    .owner-info small { font-size: 0.73rem; color: var(--champagne-dim); }
    .verified-badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-left: 0.4rem; }

    /* ── BOOKING PAGE ── */
    .booking-layout { display: grid; grid-template-columns: 1fr 380px; gap: 3rem; align-items: start; }
    .booking-summary { background: var(--obsidian-2); border: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 5rem; }
    .booking-summary h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--champagne); margin-bottom: 1.25rem; font-weight: 400; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--champagne-dim); margin-bottom: 0.5rem; }
    .form-input, .form-textarea, .form-select {
      width: 100%; background: var(--obsidian-3); border: 1px solid var(--border);
      color: var(--champagne); padding: 0.75rem 0.875rem;
      font-family: 'Switzer', sans-serif; font-size: 0.88rem; outline: none;
      transition: border-color 0.2s; resize: vertical;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold-dim); }
    .form-textarea { min-height: 100px; }
    .payment-placeholder {
      background: var(--obsidian-3); border: 1px dashed var(--border-hover);
      padding: 2rem; text-align: center; color: var(--champagne-dim); font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .payment-placeholder svg { width: 32px; height: 32px; opacity: 0.35; margin: 0 auto 0.75rem; display: block; }
    .confirmation-state { text-align: center; padding: 4rem 2rem; }
    .confirmation-state .check { width: 64px; height: 64px; background: rgba(200,155,50,0.12); border: 1px solid var(--gold-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.75rem; }
    .confirmation-state h2 { margin-bottom: 0.75rem; }
    .confirmation-state p { max-width: 400px; margin: 0 auto 2rem; }

    /* ── LIST AN ITEM WIZARD ── */
    .wizard-steps { display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; gap: 0; }
    .wizard-step-item {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; color: var(--champagne-dim); transition: all 0.3s;
    }
    .step-dot.active { border-color: var(--gold); background: var(--gold); color: var(--obsidian); font-weight: 600; }
    .step-dot.done { border-color: var(--gold-dim); background: rgba(200,155,50,0.15); color: var(--gold); }
    .step-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--champagne-dim); }
    .step-label.active { color: var(--champagne); }
    .wizard-connector { width: 60px; height: 1px; background: var(--border); margin: 0 0.25rem; }
    .wizard-connector.done { background: var(--gold-dim); }

    /* ── EARNINGS ESTIMATOR ── */
    .estimator {
      background: var(--obsidian-3); border: 1px solid var(--border);
      padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .estimator h5 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--champagne); margin-bottom: 1rem; font-weight: 400; }
    .estimate-value { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; color: var(--gold); line-height: 1; }
    .estimate-sub { font-size: 0.75rem; color: var(--champagne-dim); margin-top: 0.2rem; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 8rem 0 3rem;
      background: radial-gradient(ellipse at 50% -20%, rgba(200,155,50,0.06) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
    }
    .page-header .container { display: flex; flex-direction: column; gap: 0.5rem; }
    .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--champagne-dim); margin-bottom: 0.75rem; }
    .breadcrumb a { color: var(--champagne-dim); text-decoration: none; }
    .breadcrumb a:hover { color: var(--champagne); }
    .breadcrumb span { opacity: 0.5; }

    /* ── LOADING ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem; gap: 1rem; }
    .loading-ring { width: 40px; height: 40px; border: 1px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 0.8rem; color: var(--champagne-dim); letter-spacing: 0.1em; }

    /* ── SKELETON ── */
    .skeleton { background: linear-gradient(90deg, var(--obsidian-3) 25%, var(--obsidian-4) 50%, var(--obsidian-3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--obsidian-4); border: 1px solid var(--border-hover);
      padding: 0.875rem 1.25rem; font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.75rem;
      animation: slideUp 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── FOOTER ── */
    .footer {
      padding: 4rem 0 2rem;
      background: var(--obsidian-2);
      border-top: 1px solid var(--border);
    }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
    .footer-brand .logo-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .footer-brand .logo-wrap svg { width: 28px; height: 28px; }
    .footer-brand p { font-size: 0.85rem; max-width: 240px; line-height: 1.65; }
    .footer-col h5 { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; font-weight: 500; color: var(--champagne); margin-bottom: 1rem; letter-spacing: 0.08em; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .footer-col ul a { text-decoration: none; color: var(--champagne-dim); font-size: 0.82rem; transition: color 0.2s; }
    .footer-col ul a:hover { color: var(--champagne); }
    .footer-bottom { border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-bottom p { font-size: 0.75rem; color: var(--champagne-dim); }

    /* ── MOBILE MENU ── */
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: var(--obsidian);
      flex-direction: column; padding: 5rem 2rem 2rem;
      gap: 1.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; color: var(--champagne); text-decoration: none; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state h3 { margin-bottom: 0.5rem; font-size: 1.4rem; }
    .empty-state p { font-size: 0.88rem; margin-bottom: 1.5rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .browse-layout { grid-template-columns: 1fr; }
      .filter-sidebar { position: static; }
      .listing-layout { grid-template-columns: 1fr; }
      .listing-detail-right { position: static; }
      .booking-layout { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .lender-cta { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .grid-3 { grid-template-columns: 1fr; }
      .category-grid { grid-template-columns: repeat(3, 1fr); }
      .hiw-steps { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
      .footer-bottom { flex-direction: column; gap: 1rem; text-align: center; }
      .wizard-step-item .step-label { display: none; }
      .hero-actions { flex-direction: column; align-items: center; }
    }
    @media (max-width: 480px) {
      .grid-4 { grid-template-columns: 1fr; }
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .listing-attrs { grid-template-columns: 1fr; }
      .date-inputs { grid-template-columns: 1fr; }
      .nav-cta.primary { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

    // ── AUTH CONTEXT ──
    const AuthContext = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem('velier_user') || 'null'); } catch { return null; }
      });
      const [token, setToken] = useState(() => localStorage.getItem('velier_token') || null);
      const [authModal, setAuthModal] = useState(null); // 'login' | 'signup' | null

      const login = async (email, password) => {
        const res = await fetch('/api/auth/signin', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('velier_token', data.access_token);
        localStorage.setItem('velier_user', JSON.stringify(data.user));
        setToken(data.access_token);
        setUser(data.user);
        setAuthModal(null);
        return data.user;
      };

      const signup = async (email, password, full_name) => {
        const res = await fetch('/api/auth/signup', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password, full_name })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        // Auto-login after signup
        return login(email, password);
      };

      const logout = () => {
        localStorage.removeItem('velier_token');
        localStorage.removeItem('velier_user');
        setToken(null);
        setUser(null);
        window.location.hash = '#/';
      };

      const requireAuth = (cb) => {
        if (user) { cb(); }
        else { setAuthModal('login'); }
      };

      return (
        <AuthContext.Provider value={{ user, token, login, signup, logout, requireAuth, authModal, setAuthModal }}>
          {children}
          {authModal && <AuthModal />}
        </AuthContext.Provider>
      );
    };

    const useAuth = () => useContext(AuthContext);

    // ── AUTH MODAL ──
    const AuthModal = () => {
      const { login, signup, authModal, setAuthModal } = useAuth();
      const [mode, setMode] = useState(authModal);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [fullName, setFullName] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try {
          if (mode === 'login') { await login(email, password); }
          else { await signup(email, password, fullName); }
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      return (
        <div style={{position:'fixed',inset:0,zIndex:99999,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.75)',backdropFilter:'blur(8px)'}} onClick={() => setAuthModal(null)}>
          <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.2)',borderRadius:'2px',padding:'2.5rem',width:'100%',maxWidth:'420px',margin:'1rem'}} onClick={e => e.stopPropagation()}>

    // ── SPLASH SCREEN ──
    const SplashScreen = ({ onEnter }) => {
      const [exiting, setExiting] = React.useState(false);
      const canvasRef = React.useRef(null);

      // Canvas: animated radial shimmer that sweeps across the screen
      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let raf;
        let t = 0;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        const draw = () => {
          const W = canvas.width, H = canvas.height;
          ctx.clearRect(0, 0, W, H);

          // Slow sweeping spotlight — moves left to right every ~5s
          const cycle = 5000;
          const progress = (Date.now() % cycle) / cycle; // 0→1
          const cx = W * (-0.2 + progress * 1.4);
          const cy = H * 0.5;
          const radius = Math.max(W, H) * 0.65;

          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          grad.addColorStop(0,   'rgba(200,155,50,0.055)');
          grad.addColorStop(0.3, 'rgba(200,155,50,0.025)');
          grad.addColorStop(0.7, 'rgba(200,155,50,0.006)');
          grad.addColorStop(1,   'rgba(0,0,0,0)');

          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);

          // Second subtler counter-sweep, offset half cycle
          const progress2 = ((Date.now() + cycle * 0.5) % cycle) / cycle;
          const cx2 = W * (-0.2 + progress2 * 1.4);
          const grad2 = ctx.createRadialGradient(cx2, cy * 0.4, 0, cx2, cy * 0.4, radius * 0.5);
          grad2.addColorStop(0,   'rgba(255,240,200,0.03)');
          grad2.addColorStop(0.5, 'rgba(200,155,50,0.01)');
          grad2.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.fillStyle = grad2;
          ctx.fillRect(0, 0, W, H);

          raf = requestAnimationFrame(draw);
        };
        draw();

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
        };
      }, []);

      const handleEnter = () => {
        setExiting(true);
        setTimeout(onEnter, 1000);
      };

      // Tick mark positions (24 around circle)
      const ticks = Array.from({length: 24}, (_, i) => {
        const angle = (i / 24) * Math.PI * 2 - Math.PI / 2;
        const isMajor = i % 6 === 0;
        const r1 = isMajor ? 96 : 100;
        const r2 = 108;
        return {
          x1: 110 + Math.cos(angle) * r1,
          y1: 110 + Math.sin(angle) * r1,
          x2: 110 + Math.cos(angle) * r2,
          y2: 110 + Math.sin(angle) * r2,
          major: isMajor,
        };
      });

      return (
        <div className={`splash${exiting ? ' exiting' : ''}`}>
          <canvas ref={canvasRef} className="splash-canvas" />

          <div className="splash-icon-wrap">
            {/* Pulsing rings */}
            <div className="splash-ring"/>
            <div className="splash-ring-2"/>

            {/* Tick marks SVG — slow rotation */}
            <svg className="splash-ticks" viewBox="0 0 220 220" style={{position:'absolute',inset:0,width:'220px',height:'220px'}}>
              {ticks.map((tk, i) => (
                <line key={i}
                  x1={tk.x1} y1={tk.y1} x2={tk.x2} y2={tk.y2}
                  stroke="rgba(200,155,50,0.35)"
                  strokeWidth={tk.major ? 1.2 : 0.6}
                />
              ))}
              <circle cx="110" cy="110" r="100" stroke="rgba(200,155,50,0.1)" strokeWidth="0.5" fill="none"/>
            </svg>

            {/* Clean geometric eye — redesigned */}
            <svg className="splash-eye" width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              {/* Veil arcs — evenly spaced, clean curves */}
              <path d="M10 22 Q50 42 90 22" stroke="hsl(41,62%,60%)" strokeWidth="1.4" strokeLinecap="round" fill="none"/>
              <path d="M16 33 Q50 50 84 33" stroke="hsl(41,62%,60%)" strokeWidth="1.1" strokeLinecap="round" fill="none" opacity="0.65"/>
              <path d="M24 43 Q50 57 76 43" stroke="hsl(41,62%,60%)" strokeWidth="0.8" strokeLinecap="round" fill="none" opacity="0.4"/>

              {/* Eye — perfect almond using cubic bezier for precision */}
              <path d="M20 65 C32 52 68 52 80 65 C68 78 32 78 20 65 Z"
                stroke="hsl(41,62%,60%)" strokeWidth="1.2" fill="none" strokeLinejoin="round"/>

              {/* Iris circle */}
              <circle cx="50" cy="65" r="9" stroke="hsl(41,62%,60%)" strokeWidth="1" fill="none"/>

              {/* Pupil — filled */}
              <circle cx="50" cy="65" r="3.5" fill="hsl(41,62%,60%)"/>

              {/* Subtle inner iris detail */}
              <circle cx="50" cy="65" r="6" stroke="hsl(41,62%,60%)" strokeWidth="0.4" fill="none" opacity="0.4"/>

              {/* Hem line */}
              <line x1="14" y1="88" x2="86" y2="88" stroke="hsl(41,62%,60%)" strokeWidth="0.6" opacity="0.35"/>
              {/* Corner dots */}

              <circle cx="86" cy="88" r="1" fill="hsl(41,62%,60%)" opacity="0.4"/>
            </svg>
          </div>

          <div className="splash-wordmark">Velier</div>
          <div className="splash-tagline">Access everything · Own nothing</div>

          <button className="splash-enter" onClick={handleEnter}>

        </div>
      );
    };

    // ── BROWSE PAGE ──

      const initialCategory = params.get('category') || 'All';

      const [listings, setListings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedBrands, setSelectedBrands] = useState([]);
      const [activeCategory, setActiveCategory] = useState(initialCategory);
      const [sort, setSort] = useState('featured');
      const allBrands = ['Prada', 'Gucci', 'Chanel', 'Hermès', 'Bottega Veneta', 'Valentino', 'Rolex', 'Audemars Piguet', 'Cartier', 'Saint Laurent', 'Louboutin', 'Alexander McQueen'];
      const categories = ['All', 'Bags', 'Watches', 'Dresses', 'Jewellery', 'Shoes'];

      useEffect(() => {
        setLoading(true);
        let url = '/api/listings?';
        if (activeCategory !== 'All') url += `category=${activeCategory}&`;
        if (selectedBrands.length === 1) url += `brand=${selectedBrands[0]}&`;
        url += `sort=${sort}`;
        fetch(url)
          .then(r => r.json())
          .then(data => {
            const filtered = selectedBrands.length > 1
              ? data.filter(l => selectedBrands.includes(l.brand))
              : data;
            setListings(filtered);
            setLoading(false);
          })
          .catch(() => setLoading(false));
        window.scrollTo(0, 0);
      }, [activeCategory, selectedBrands, sort]);

      useEffect(() => {
        const p = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
        const cat = p.get('category') || 'All';
        setActiveCategory(cat);
      }, [hash]);

      const toggleBrand = (brand) => {
        setSelectedBrands(prev =>
          prev.includes(brand) ? prev.filter(b => b !== brand) : [...prev, brand]
        );
      };

      const removeChip = (brand) => setSelectedBrands(prev => prev.filter(b => b !== brand));

      return (
        <div>

        fetch(`/api/listings/${id}`)
          .then(r => r.json()).then(data => { setListing(data); setLoading(false); })

          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ action: inWishlist ? 'remove' : 'add' })

                  <div className="attr-pill"><div className="attr-name">Size</div><div className="attr-val">{listing.size}</div></div>
                  <div className="attr-pill"><div className="attr-name">Category</div><div className="attr-val">{listing.category}</div></div>

                <div className="verified-id-badge">◈ ID Verification Required to Reserve</div>
                <p style={{marginBottom:'1.5rem',fontSize:'0.88rem',lineHeight:1.75,color:'var(--champagne-dim)'}}>{listing.description}</p>

                  <div className="retail-value">Retail value: <strong>${listing.retail_price?.toLocaleString()}</strong> — hire from <strong>${listing.daily_rate}/day</strong></div>
                )}

                  <div className="rate-schedule-title">Hire Rates</div>
                  <div className="rate-row">
                    <span className="rate-row-label">Daily</span>
                    <span className="rate-row-price">${listing.daily_rate}<span style={{fontSize:'0.72rem',color:'var(--champagne-dim)',marginLeft:'2px'}}>/day</span></span>

      { id: 2, title: 'Hermès Birkin 30 Biscuit Togo', brand: 'Hermès', value: 22000, image: 'https://mightychic.com/wp-content/uploads/2023/12/hermes-birkin-30-biscuit-bag-for-sale-on-mightychic.jpg', condition: 'Excellent', seeking: 'Chanel Classic Double Flap or Hermès Kelly 28', owner: 'Isabelle M.', location: 'Paris, France' },
      { id: 3, title: 'Patek Philippe Calatrava 5127R', brand: 'Patek Philippe', value: 28000, image: 'https://cdn.swisswatchexpo.com/productphotos/10/11/patek-philippe-calatrava-rose-gold-automatic-mens-watch-5127r-65252_8fb2d.jpg', condition: 'Like New', seeking: 'Patek Philippe Nautilus 5711 or Perpetual Calendar', owner: 'Thomas K.', location: 'Geneva, Switzerland' },
      { id: 4, title: 'Chanel Classic Double Flap Ivory', brand: 'Chanel', value: 9800, image: 'https://madisonavenuecouture.com/cdn/shop/files/C-V-230601-3-01_1024x1024.jpg?v=1690559192', condition: 'Very Good', seeking: 'Saint Laurent Le 5 à 7 Large or Bottega Veneta Cassette', owner: 'Sofia L.', location: 'Milan, Italy' },
      { id: 5, title: 'Audemars Piguet Royal Oak 41mm', brand: 'Audemars Piguet', value: 32000, image: 'https://img.chrono24.com/images/uhren/38363070-j9iuygz0p39berthgowhnlm7-ExtraLarge.jpg', condition: 'Excellent', seeking: 'Patek Philippe Nautilus 5711 or Rolex Daytona White Gold', owner: 'Henrik S.', location: 'Stockholm, Sweden' },
      { id: 6, title: 'Valentino VLogo Fuchsia Gown', brand: 'Valentino', value: 4200, image: 'https://a.1stdibscdn.com/archivesE/upload/366869/v_11197031460738547313/_MG_0562_copy_org_master.jpg?width=1200', condition: 'Excellent', seeking: 'Alexander McQueen gown or Givenchy couture piece', owner: 'Amara D.', location: 'Dubai, UAE' },
    ];

    const TradePage = () => {
      return (
        <div>
          <div className="trade-hero">
            <div className="container">
              <div className="section-label" style={{marginBottom:'1rem'}}>New on Velier</div>
              <h1>Asset Exchange</h1>
              <p>Trade luxury pieces peer-to-peer. List your item, set what you're seeking, and exchange with verified members — at a fraction of resale friction.</p>
              <a href="#/list" className="btn btn-gold" style={{display:'inline-block'}}>List an Item for Trade</a>
            </div>
          </div>
          <div className="container section">
            <div className="trade-fee-info">
              <div className="section-label" style={{marginBottom:'1rem',textAlign:'center'}}>How Trades Work</div>
              <div className="trade-fee-grid">
                <div className="trade-fee-item">
                  <div className="tfi-val">2.5%</div>
                  <div className="tfi-label">Trade fee per party<br/>(capped at $500)</div>
                </div>
                <div className="trade-fee-item">
                  <div className="tfi-val">◈</div>
                  <div className="tfi-label">ID Verification<br/>required for all trades</div>
                </div>
                <div className="trade-fee-item">
                  <div className="tfi-val">48h</div>
                  <div className="tfi-label">Escrow window<br/>for condition confirmation</div>
                </div>
              </div>
            </div>
            <div className="section-header" style={{marginBottom:'2rem'}}>
              <div className="section-label">Available Trades</div>
              <h2>Browse Exchange Listings</h2>
            </div>
            <div className="trade-grid">
              {trades.map(t => (
                <div key={t.id} className="trade-card">
                  <div className="trade-card-header">
                    <span style={{fontSize:'0.7rem',letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--champagne-dim)'}}>{t.owner} · {t.location}</span>
                    <span className="trade-badge">Trade</span>
                  </div>
                  <div className="trade-item-img" style={{backgroundImage:`url(${t.image})`,backgroundSize:'cover',backgroundPosition:'center'}}></div>
                  <div className="trade-item-title">{t.title}</div>
                  <div className="trade-item-meta">{t.brand} · {t.condition}</div>
                  <div className="trade-value">Estimated Value: <strong>${t.value.toLocaleString()}</strong></div>
                  <div className="trade-seeking">
                    <span style={{fontSize:'0.65rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--champagne-dim)',display:'block',marginBottom:'0.25rem'}}>Seeking</span>
                    <span>{t.seeking}</span>
                  </div>
                  <button className="btn btn-gold" style={{width:'100%',fontSize:'0.78rem'}}
