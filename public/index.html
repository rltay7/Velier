    };

    // ── DASHBOARD PAGE ──
    const DashboardPage = () => {
      const { user, token, setAuthModal } = useAuth();
      const [tab, setTab] = useState('listings');
      const [listings, setListings] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editListing, setEditListing] = useState(null); // listing being edited
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [saveMsg, setSaveMsg] = useState('');

      useEffect(() => {
        if (!user || !token) return;
        setLoading(true);
        Promise.all([
          fetch('/api/dashboard/listings', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
          fetch('/api/dashboard/bookings', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
        ]).then(([l, b]) => {
          setListings(Array.isArray(l) ? l : []);
          setBookings(Array.isArray(b) ? b : []);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [user, token]);

      const deactivateListing = async (id) => {
        await fetch(`/api/listings/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
        setListings(prev => prev.filter(l => l.id !== id));
      };

      const openEdit = (l) => {
        setEditListing(l);
        setEditForm({
          title: l.title || '',
          brand: l.brand || '',
          category: l.category || '',
          description: l.description || '',
          daily_rate: l.daily_rate || '',
          condition: l.condition || '',
          colour: l.colour || '',
          size: l.size || '',
          location: l.location || '',
        });
        setSaveMsg('');
      };

      const saveEdit = async () => {
        setSaving(true); setSaveMsg('');
        const daily = parseFloat(editForm.daily_rate);
        const updates = {
          ...editForm,
          daily_rate: daily,
          weekly_rate: Math.round(daily * 5.5),
          monthly_rate: Math.round(daily * 18),
        };
        const res = await fetch(`/api/listings/${editListing.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(updates),
        });
        setSaving(false);
        if (res.ok) {
          const updated = await res.json();
          setListings(prev => prev.map(l => l.id === editListing.id ? { ...l, ...updated } : l));
          setSaveMsg('Saved');
          setTimeout(() => { setEditListing(null); setSaveMsg(''); }, 800);
        } else {
          const err = await res.json().catch(() => ({}));
          setSaveMsg(err.error || 'Save failed — please try again');
        }
      };

      const fld = (label, key, type = 'text', placeholder = '') => (
        <div style={{marginBottom:'1rem'}}>
          <label style={{display:'block',fontSize:'0.7rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--champagne-dim)',marginBottom:'0.4rem'}}>{label}</label>
          {key === 'description' ? (
            <textarea value={editForm[key]} onChange={e => setEditForm(f => ({...f, [key]: e.target.value}))}
              style={{width:'100%',background:'#1a1713',border:'1px solid rgba(200,168,75,0.15)',borderRadius:'2px',padding:'0.7rem 0.9rem',color:'var(--champagne)',fontSize:'0.9rem',outline:'none',resize:'vertical',minHeight:'80px',boxSizing:'border-box'}} />
          ) : (
            <input type={type} value={editForm[key]} onChange={e => setEditForm(f => ({...f, [key]: e.target.value}))} placeholder={placeholder}
              style={{width:'100%',background:'#1a1713',border:'1px solid rgba(200,168,75,0.15)',borderRadius:'2px',padding:'0.7rem 0.9rem',color:'var(--champagne)',fontSize:'0.9rem',outline:'none',boxSizing:'border-box'}} />
          )}
        </div>
      );

      if (!user) return (
        <div style={{minHeight:'60vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1.5rem',padding:'4rem 2rem'}}>
          <h2 style={{fontFamily:'Cormorant Garamond',fontSize:'2rem',fontWeight:400,color:'var(--champagne)'}}>Sign in to access your dashboard</h2>
          <p style={{color:'var(--champagne-dim)'}}>Manage your listings and reservations in one place.</p>
          <button onClick={() => setAuthModal('login')} style={{background:'var(--gold)',border:'none',borderRadius:'2px',padding:'0.85rem 2.5rem',color:'var(--obsidian)',fontWeight:600,fontSize:'0.9rem',letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer'}}>Sign In</button>
        </div>
      );

      const tabStyle = (t) => ({
        background:'none', border:'none', cursor:'pointer', padding:'0.6rem 1.25rem',
        color: tab === t ? 'var(--champagne)' : 'var(--champagne-dim)',
        borderBottom: tab === t ? '1px solid var(--gold)' : '1px solid transparent',
        fontSize:'0.85rem', letterSpacing:'0.1em', textTransform:'uppercase', fontFamily:'Switzer, sans-serif',
      });

      const statusBadge = (s) => {
        const colors = { confirmed: '#4caf7d', pending: '#c8a84b', cancelled: '#e06060', live: '#4caf7d' };
        return <span style={{background:`${colors[s]||'#888'}22`,color:colors[s]||'#888',border:`1px solid ${colors[s]||'#888'}44`,borderRadius:'2px',padding:'2px 8px',fontSize:'0.75rem',letterSpacing:'0.06em',textTransform:'uppercase'}}>{s}</span>;
      };

      return (
        <div style={{maxWidth:'1000px',margin:'0 auto',padding:'6rem 2rem 4rem'}}>

          {/* Edit Modal */}
          {editListing && (
            <div style={{position:'fixed',inset:0,zIndex:99999,overflowY:'auto',background:'rgba(0,0,0,0.8)',backdropFilter:'blur(8px)'}} onClick={() => setEditListing(null)}>
              <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.2)',borderRadius:'2px',width:'100%',maxWidth:'560px',padding:'2rem',margin:'5vh auto 4rem',position:'relative'}} onClick={e => e.stopPropagation()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.75rem'}}>
                  <h2 style={{fontFamily:'Cormorant Garamond',fontSize:'1.6rem',fontWeight:400,color:'var(--champagne)',margin:0}}>Edit Listing</h2>
                  <button onClick={() => setEditListing(null)} style={{background:'none',border:'none',color:'var(--champagne-dim)',fontSize:'1.5rem',cursor:'pointer',lineHeight:1}}>×</button>
                </div>
                {editListing.image && <img src={editListing.image} style={{width:'100%',height:'160px',objectFit:'cover',borderRadius:'2px',marginBottom:'1.5rem'}} />}
                {fld('Title', 'title')}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                  {fld('Brand', 'brand')}
                  {fld('Category', 'category')}
                  {fld('Colour', 'colour')}
                  {fld('Size', 'size')}
                  {fld('Condition', 'condition')}
                  {fld('Location', 'location')}
                  {fld('Daily Rate ($)', 'daily_rate', 'number')}
                </div>
                {fld('Description', 'description')}
                <div style={{display:'flex',gap:'0.75rem',marginTop:'0.5rem',alignItems:'center'}}>
                  <button onClick={() => setEditListing(null)} style={{background:'none',border:'1px solid var(--border-hover)',color:'var(--champagne-dim)',borderRadius:'2px',padding:'0.75rem 1.25rem',fontSize:'0.82rem',letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer'}}>Cancel</button>
                  <button onClick={saveEdit} disabled={saving} style={{flex:1,background:'var(--gold)',border:'none',borderRadius:'2px',padding:'0.75rem',color:'var(--obsidian)',fontWeight:700,fontSize:'0.85rem',letterSpacing:'0.08em',textTransform:'uppercase',cursor:saving?'not-allowed':'pointer',opacity:saving?0.7:1}}>
                    {saving ? 'Saving...' : 'Save Changes'}
                  </button>
                  {saveMsg && <span style={{fontSize:'0.82rem',color: saveMsg==='Saved' ? '#4caf7d' : '#e06060'}}>{saveMsg}</span>}
                </div>
              </div>
            </div>
          )}

          <div style={{marginBottom:'2.5rem'}}>
            <h1 style={{fontFamily:'Cormorant Garamond',fontSize:'2.5rem',fontWeight:400,color:'var(--champagne)',marginBottom:'0.5rem'}}>My Account</h1>
            <p style={{color:'var(--champagne-dim)'}}>{user.email} &nbsp;·&nbsp; <a href="#/list" style={{color:'var(--gold)'}}>+ List a new item</a></p>
          </div>

          <div style={{display:'flex',gap:'0',borderBottom:'1px solid var(--border)',marginBottom:'2.5rem'}}>
            <button style={tabStyle('listings')} onClick={() => setTab('listings')}>My Listings ({listings.length})</button>
            <button style={tabStyle('bookings')} onClick={() => setTab('bookings')}>My Reservations ({bookings.length})</button>
          </div>

          {loading ? (
            <div style={{textAlign:'center',padding:'4rem',color:'var(--champagne-dim)'}}>Loading...</div>
          ) : tab === 'listings' ? (
            listings.length === 0 ? (
              <div style={{textAlign:'center',padding:'4rem',color:'var(--champagne-dim)'}}>
                <p style={{marginBottom:'1.5rem'}}>You haven't listed any items yet.</p>
                <a href="#/list" style={{background:'var(--gold)',borderRadius:'2px',padding:'0.8rem 2rem',color:'var(--obsidian)',fontWeight:600,fontSize:'0.85rem',letterSpacing:'0.08em',textTransform:'uppercase',textDecoration:'none'}}>List Your First Item</a>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                {listings.map(l => (
                  <div key={l.id} style={{background:'var(--obsidian-3)',border:'1px solid var(--border)',borderRadius:'2px',padding:'1.5rem',display:'flex',gap:'1.5rem',alignItems:'center',transition:'border-color 0.2s',cursor:'pointer'}}
                    onClick={() => openEdit(l)}
                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(200,168,75,0.3)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor='var(--border)'}
                  >
                    {l.image && <img src={l.image} alt={l.title} style={{width:'80px',height:'80px',objectFit:'cover',borderRadius:'2px',flexShrink:0}} />}
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.35rem'}}>
                        <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.2rem',fontWeight:400,color:'var(--champagne)',margin:0}}>{l.title}</h3>
                        {statusBadge(l.is_active ? 'live' : 'inactive')}
                      </div>
                      <p style={{color:'var(--champagne-dim)',fontSize:'0.85rem',margin:'0 0 0.5rem'}}>{l.category} · {l.brand} · {l.location}</p>
                      <p style={{color:'var(--gold)',fontSize:'0.9rem',margin:0}}>${l.daily_rate}/day · ${l.weekly_rate}/week · ${l.monthly_rate}/month</p>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',alignItems:'flex-end',flexShrink:0}}>
                      <button onClick={e => { e.stopPropagation(); openEdit(l); }}
                        style={{background:'none',border:'1px solid rgba(200,168,75,0.25)',color:'var(--champagne-dim)',borderRadius:'2px',padding:'0.4rem 0.9rem',fontSize:'0.75rem',letterSpacing:'0.06em',textTransform:'uppercase',cursor:'pointer'}}>Edit</button>
                      <button onClick={e => { e.stopPropagation(); deactivateListing(l.id); }}
                        style={{background:'none',border:'1px solid rgba(200,80,80,0.3)',color:'rgba(200,80,80,0.7)',borderRadius:'2px',padding:'0.4rem 0.9rem',fontSize:'0.75rem',letterSpacing:'0.06em',textTransform:'uppercase',cursor:'pointer'}}>Remove</button>
                    </div>
                  </div>
                ))}
              </div>
            )
          ) : (
            bookings.length === 0 ? (
              <div style={{textAlign:'center',padding:'4rem',color:'var(--champagne-dim)'}}>
                <p style={{marginBottom:'1.5rem'}}>No reservations yet.</p>
                <a href="#/browse" style={{background:'var(--gold)',borderRadius:'2px',padding:'0.8rem 2rem',color:'var(--obsidian)',fontWeight:600,fontSize:'0.85rem',letterSpacing:'0.08em',textTransform:'uppercase',textDecoration:'none'}}>Browse the Collection</a>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                {bookings.map(b => (
                  <div key={b.id} style={{background:'var(--obsidian-3)',border:'1px solid var(--border)',borderRadius:'2px',padding:'1.5rem'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                      <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.2rem',fontWeight:400,color:'var(--champagne)',margin:0}}>Booking #{b.id}</h3>
                      {statusBadge(b.status)}
                    </div>
                    <p style={{color:'var(--champagne-dim)',fontSize:'0.85rem',margin:'0 0 0.25rem'}}>{b.start_date} → {b.end_date} &nbsp;·&nbsp; {b.days} day{b.days !== 1 ? 's' : ''}</p>
                    <p style={{color:'var(--gold)',fontSize:'0.9rem',margin:0}}>${b.total_price?.toLocaleString()} total {b.insurance_tier !== 'none' ? `· ${b.insurance_tier} insurance` : ''}</p>
                  </div>
                ))}
              </div>
            )
          )}
        </div>
      );
    };

    // ── ADMIN PANEL ──
    const ADMIN_SECRET = 'velier-admin-2026';

    const AdminPage = () => {
      const [authed, setAuthed] = useState(() => sessionStorage.getItem('velier_admin') === 'true');
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState('');
      const [tab, setTab] = useState('listings');
      const [listings, setListings] = useState([]);
      const [users, setUsers] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [toast, setToast] = useState('');

      const adminFetch = (path, opts = {}) => fetch(path, {
        ...opts,
        headers: { 'x-admin-secret': ADMIN_SECRET, 'Content-Type': 'application/json', ...(opts.headers || {}) }
      });

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

      const handleLogin = (e) => {
        e.preventDefault();
        if (password === ADMIN_SECRET) {
          sessionStorage.setItem('velier_admin', 'true');
          setAuthed(true);
        } else {
          setAuthError('Incorrect password');
        }
      };

      const loadTab = async (t) => {
        setTab(t); setLoading(true);
        try {
          if (t === 'listings') {
            const r = await adminFetch('/api/admin/listings');
            setListings(await r.json());
          } else if (t === 'users') {
            const r = await adminFetch('/api/admin/users');
            setUsers(await r.json());
          } else if (t === 'bookings') {
            const r = await adminFetch('/api/admin/bookings');
            setBookings(await r.json());
          }
        } catch(e) { showToast('Load failed'); }
        setLoading(false);
      };

      useEffect(() => { if (authed) loadTab('listings'); }, [authed]);

      const toggleListing = async (id, current) => {
        await adminFetch(`/api/admin/listings/${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: !current }) });
        setListings(prev => prev.map(l => l.id === id ? {...l, is_active: !current} : l));
        showToast(current ? 'Listing suspended' : 'Listing approved');
      };

      const deleteListing = async (id) => {
        if (!confirm('Delete this listing permanently?')) return;
        await adminFetch(`/api/admin/listings/${id}`, { method: 'DELETE' });
        setListings(prev => prev.filter(l => l.id !== id));
        showToast('Listing deleted');
      };

      const deleteUser = async (id) => {
        if (!confirm('Delete this user permanently?')) return;
        await adminFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        setUsers(prev => prev.filter(u => u.id !== id));
        showToast('User deleted');
      };

      const updateBookingStatus = async (id, status) => {
        await adminFetch(`/api/admin/bookings/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
        setBookings(prev => prev.map(b => b.id === id ? {...b, status} : b));
        showToast('Status updated');
      };

      const tabStyle = (t) => ({
        background:'none', border:'none', cursor:'pointer', padding:'0.7rem 1.5rem',
        color: tab === t ? '#fff' : 'rgba(255,255,255,0.45)',
        borderBottom: tab === t ? '2px solid #c8a84b' : '2px solid transparent',
        fontSize:'0.82rem', letterSpacing:'0.1em', textTransform:'uppercase',
        fontFamily:'Switzer, sans-serif', transition:'color 0.2s',
      });

      const badge = (val, trueLabel='Active', falseLabel='Suspended') => (
        <span style={{background: val ? '#4caf7d22' : '#e0606022', color: val ? '#4caf7d' : '#e06060',
          border: `1px solid ${val ? '#4caf7d44' : '#e0606044'}`, borderRadius:'2px',
          padding:'2px 8px', fontSize:'0.72rem', letterSpacing:'0.06em', textTransform:'uppercase'}}>
          {val ? trueLabel : falseLabel}
        </span>
      );

      const statusBadge = (s) => {
        const c = {confirmed:'#4caf7d',pending:'#c8a84b',cancelled:'#e06060'}[s] || '#888';
        return <span style={{background:`${c}22`,color:c,border:`1px solid ${c}44`,borderRadius:'2px',padding:'2px 8px',fontSize:'0.72rem',letterSpacing:'0.06em',textTransform:'uppercase'}}>{s}</span>;
      };

      if (!authed) return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0d0b09'}}>
          <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.2)',padding:'2.5rem',width:'100%',maxWidth:'380px',margin:'1rem'}}>
            <h2 style={{fontFamily:'Cormorant Garamond',fontSize:'1.8rem',fontWeight:400,color:'#c8a84b',marginBottom:'0.25rem',textAlign:'center'}}>VELIER</h2>
            <p style={{color:'rgba(255,255,255,0.4)',fontSize:'0.75rem',letterSpacing:'0.15em',textTransform:'uppercase',textAlign:'center',marginBottom:'2rem'}}>Admin Access</p>
            {authError && <div style={{background:'rgba(200,60,60,0.15)',border:'1px solid rgba(200,60,60,0.3)',padding:'0.75rem',marginBottom:'1rem',color:'#e88',fontSize:'0.85rem',borderRadius:'2px'}}>{authError}</div>}
            <form onSubmit={handleLogin}>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                placeholder="Admin password" autoFocus
                style={{width:'100%',background:'#1a1713',border:'1px solid rgba(200,168,75,0.15)',padding:'0.85rem 1rem',color:'#fff',fontSize:'0.95rem',outline:'none',marginBottom:'1rem',boxSizing:'border-box'}} />
              <button type="submit" style={{width:'100%',background:'#c8a84b',border:'none',padding:'0.9rem',color:'#0d0b09',fontWeight:700,fontSize:'0.85rem',letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer'}}>Enter</button>
            </form>
          </div>
        </div>
      );

      return (
        <div style={{minHeight:'100vh',background:'#0a0908',color:'#fff',fontFamily:'Switzer, sans-serif'}}>
          {/* Admin nav */}
          <div style={{background:'#131109',borderBottom:'1px solid rgba(200,168,75,0.12)',padding:'0 2rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:'56px',position:'sticky',top:0,zIndex:100}}>
            <div style={{display:'flex',alignItems:'center',gap:'1.5rem'}}>
              <span style={{fontFamily:'Cormorant Garamond',fontSize:'1.2rem',color:'#c8a84b',letterSpacing:'0.1em'}}>VELIER ADMIN</span>
              <span style={{color:'rgba(255,255,255,0.2)',fontSize:'0.75rem'}}>◈</span>
              <button style={tabStyle('listings')} onClick={() => loadTab('listings')}>Listings</button>
              <button style={tabStyle('users')} onClick={() => loadTab('users')}>Users</button>
              <button style={tabStyle('bookings')} onClick={() => loadTab('bookings')}>Bookings</button>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
              <a href="#/" style={{color:'rgba(255,255,255,0.4)',fontSize:'0.78rem',textDecoration:'none',letterSpacing:'0.08em'}}>← Back to site</a>
              <button onClick={() => { sessionStorage.removeItem('velier_admin'); setAuthed(false); }}
                style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.4)',padding:'0.35rem 0.85rem',fontSize:'0.75rem',letterSpacing:'0.08em',cursor:'pointer'}}>Sign Out</button>
            </div>
          </div>

          <div style={{maxWidth:'1200px',margin:'0 auto',padding:'2rem'}}>
            {/* Stats row */}
            {tab === 'listings' && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'1rem',marginBottom:'2rem'}}>
                {[
                  ['Total Listings', listings.length],
                  ['Active', listings.filter(l=>l.is_active).length],
                  ['Suspended', listings.filter(l=>!l.is_active).length],
                  ['Categories', [...new Set(listings.map(l=>l.category))].length],
                ].map(([label, val]) => (
                  <div key={label} style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)',padding:'1.25rem 1.5rem'}}>
                    <div style={{fontSize:'1.8rem',fontFamily:'Cormorant Garamond',color:'#c8a84b',marginBottom:'0.25rem'}}>{val}</div>
                    <div style={{fontSize:'0.72rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>{label}</div>
                  </div>
                ))}
              </div>
            )}
            {tab === 'users' && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem',marginBottom:'2rem'}}>
                {[
                  ['Total Users', users.length],
                  ['Confirmed', users.filter(u=>u.confirmed).length],
                  ['Unconfirmed', users.filter(u=>!u.confirmed).length],
                ].map(([label, val]) => (
                  <div key={label} style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)',padding:'1.25rem 1.5rem'}}>
                    <div style={{fontSize:'1.8rem',fontFamily:'Cormorant Garamond',color:'#c8a84b',marginBottom:'0.25rem'}}>{val}</div>
                    <div style={{fontSize:'0.72rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>{label}</div>
                  </div>
                ))}
              </div>
            )}
            {tab === 'bookings' && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'1rem',marginBottom:'2rem'}}>
                {[
                  ['Total Bookings', bookings.length],
                  ['Confirmed', bookings.filter(b=>b.status==='confirmed').length],
                  ['Pending', bookings.filter(b=>b.status==='pending').length],
                  ['Revenue', '$' + bookings.filter(b=>b.status==='confirmed').reduce((s,b)=>s+(b.total_price||0),0).toLocaleString()],
                ].map(([label, val]) => (
                  <div key={label} style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)',padding:'1.25rem 1.5rem'}}>
                    <div style={{fontSize:'1.8rem',fontFamily:'Cormorant Garamond',color:'#c8a84b',marginBottom:'0.25rem'}}>{val}</div>
                    <div style={{fontSize:'0.72rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>{label}</div>
                  </div>
                ))}
              </div>
            )}

            {loading ? (
              <div style={{textAlign:'center',padding:'4rem',color:'rgba(255,255,255,0.3)'}}>Loading...</div>
            ) : (
              <>
              {/* LISTINGS TABLE */}
              {tab === 'listings' && (
                <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)'}}>
                  <div style={{padding:'1rem 1.5rem',borderBottom:'1px solid rgba(200,168,75,0.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:'0.78rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>User-Submitted Listings</span>
                    <span style={{fontSize:'0.78rem',color:'rgba(255,255,255,0.25)'}}>{listings.length} total</span>
                  </div>
                  {listings.length === 0 ? (
                    <div style={{padding:'3rem',textAlign:'center',color:'rgba(255,255,255,0.3)'}}>No user listings yet</div>
                  ) : listings.map(l => (
                    <div key={l.id} style={{display:'flex',gap:'1rem',alignItems:'center',padding:'1rem 1.5rem',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      {l.image ? (
                        <img src={l.image} style={{width:56,height:56,objectFit:'cover',borderRadius:'2px',flexShrink:0}} />
                      ) : (
                        <div style={{width:56,height:56,background:'#1a1713',borderRadius:'2px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.2)',fontSize:'1.2rem'}}>◈</div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:'Cormorant Garamond',fontSize:'1.05rem',color:'#fff',marginBottom:'0.2rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.title}</div>
                        <div style={{fontSize:'0.75rem',color:'rgba(255,255,255,0.4)'}}>{l.brand} · {l.category} · {l.location || 'No location'} · <span style={{color:'#c8a84b'}}>${l.daily_rate}/day</span></div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',flexShrink:0}}>
                        {badge(l.is_active)}
                        <button onClick={() => toggleListing(l.id, l.is_active)}
                          style={{background: l.is_active ? 'rgba(224,96,96,0.1)' : 'rgba(76,175,125,0.1)',
                            border: `1px solid ${l.is_active ? 'rgba(224,96,96,0.3)' : 'rgba(76,175,125,0.3)'}`,
                            color: l.is_active ? '#e06060' : '#4caf7d',
                            padding:'0.35rem 0.85rem',fontSize:'0.75rem',letterSpacing:'0.06em',cursor:'pointer',textTransform:'uppercase'}}>
                          {l.is_active ? 'Suspend' : 'Approve'}
                        </button>
                        <button onClick={() => deleteListing(l.id)}
                          style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.3)',
                            padding:'0.35rem 0.85rem',fontSize:'0.75rem',letterSpacing:'0.06em',cursor:'pointer',textTransform:'uppercase'}}>
                          Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* USERS TABLE */}
              {tab === 'users' && (
                <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)'}}>
                  <div style={{padding:'1rem 1.5rem',borderBottom:'1px solid rgba(200,168,75,0.08)'}}>
                    <span style={{fontSize:'0.78rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>Registered Users</span>
                  </div>
                  {users.length === 0 ? (
                    <div style={{padding:'3rem',textAlign:'center',color:'rgba(255,255,255,0.3)'}}>No users yet</div>
                  ) : users.map(u => (
                    <div key={u.id} style={{display:'flex',alignItems:'center',gap:'1rem',padding:'1rem 1.5rem',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <div style={{width:38,height:38,borderRadius:'50%',background:'rgba(200,168,75,0.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#c8a84b',fontFamily:'Cormorant Garamond',fontSize:'1rem',flexShrink:0}}>
                        {(u.full_name||u.email||'?')[0].toUpperCase()}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{color:'#fff',fontSize:'0.9rem',marginBottom:'0.15rem'}}>{u.full_name || '—'}</div>
                        <div style={{color:'rgba(255,255,255,0.4)',fontSize:'0.78rem'}}>{u.email} · Joined {new Date(u.created_at).toLocaleDateString()}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',flexShrink:0}}>
                        {badge(u.confirmed, 'Verified', 'Unverified')}
                        {u.last_sign_in && <span style={{fontSize:'0.72rem',color:'rgba(255,255,255,0.3)'}}>Last seen {new Date(u.last_sign_in).toLocaleDateString()}</span>}
                        <button onClick={() => deleteUser(u.id)}
                          style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.3)',
                            padding:'0.35rem 0.85rem',fontSize:'0.75rem',letterSpacing:'0.06em',cursor:'pointer',textTransform:'uppercase'}}>
                          Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* BOOKINGS TABLE */}
              {tab === 'bookings' && (
                <div style={{background:'#131109',border:'1px solid rgba(200,168,75,0.1)'}}>
                  <div style={{padding:'1rem 1.5rem',borderBottom:'1px solid rgba(200,168,75,0.08)'}}>
                    <span style={{fontSize:'0.78rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>All Bookings</span>
                  </div>
                  {bookings.length === 0 ? (
                    <div style={{padding:'3rem',textAlign:'center',color:'rgba(255,255,255,0.3)'}}>No bookings yet</div>
                  ) : bookings.map(b => (
                    <div key={b.id} style={{display:'flex',alignItems:'center',gap:'1rem',padding:'1rem 1.5rem',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <div style={{flex:1}}>
                        <div style={{color:'#fff',fontSize:'0.9rem',marginBottom:'0.2rem'}}>Booking #{b.id} · Listing #{b.listing_id}</div>
                        <div style={{color:'rgba(255,255,255,0.4)',fontSize:'0.78rem'}}>{b.start_date} → {b.end_date} · {b.days} day{b.days!==1?'s':''} · <span style={{color:'#c8a84b'}}>${b.total_price?.toLocaleString()}</span></div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',flexShrink:0}}>
                        {statusBadge(b.status)}
                        <select value={b.status} onChange={e => updateBookingStatus(b.id, e.target.value)}
                          style={{background:'#1a1713',border:'1px solid rgba(200,168,75,0.15)',color:'rgba(255,255,255,0.6)',
                            padding:'0.3rem 0.6rem',fontSize:'0.75rem',cursor:'pointer',outline:'none'}}>
                          <option value="pending">Pending</option>
                          <option value="confirmed">Confirmed</option>
                          <option value="cancelled">Cancelled</option>
                          <option value="completed">Completed</option>
                        </select>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              </>
            )}
          </div>

          {/* Toast */}
          {toast && (
            <div style={{position:'fixed',bottom:'2rem',left:'50%',transform:'translateX(-50%)',background:'#131109',border:'1px solid rgba(200,168,75,0.3)',padding:'0.75rem 1.5rem',color:'#c8a84b',fontSize:'0.85rem',letterSpacing:'0.06em',zIndex:9999}}>
              {toast}
            </div>
          )}
        </div>
      );
    };

    // ── MAIN APP ──
    const App = () => {
      const hash = useHash();
      const [wishlist, setWishlist] = useState(() => {
        try { return JSON.parse(localStorage.getItem('velier_wishlist') || '[]'); } catch { return []; }
      });
      const [toast, setToast] = useState(null);
      const [showSplash, setShowSplash] = useState(() => {
        return !sessionStorage.getItem('velier_entered');
      });
      const handleEnter = () => {
        sessionStorage.setItem('velier_entered', '1');
        setShowSplash(false);
        window.dispatchEvent(new Event('velier_entered'));
      };

      useEffect(() => {
        localStorage.setItem('velier_wishlist', JSON.stringify(wishlist));
      }, [wishlist]);

      const handleWishlistToggle = useCallback((id) => {
        setWishlist(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      }, []);

      const showToast = useCallback((msg) => {
        setToast(msg);
      }, []);

      // Parse route
      let page = 'home';
      let listingId = null;
      let bookingId = null;
      let bookingSearch = '';

      if (hash.startsWith('#/listing/')) {
        page = 'listing';
        listingId = hash.replace('#/listing/', '').split('?')[0];
      } else if (hash.startsWith('#/booking/')) {
        page = 'booking';
        const rest = hash.replace('#/booking/', '');
        bookingId = rest.split('?')[0];
        bookingSearch = rest.includes('?') ? rest.split('?')[1] : '';
      } else if (hash.startsWith('#/browse')) {
        page = 'browse';
      } else if (hash.startsWith('#/trade')) {
        page = 'trade';
      } else if (hash.startsWith('#/list')) {
        page = 'list';
      } else if (hash.startsWith('#/dashboard')) {
        page = 'dashboard';
      } else if (hash.startsWith('#/admin')) {
        page = 'admin';
      }

      return (
        <>
          {showSplash && <SplashScreen onEnter={handleEnter} />}
          {page !== 'admin' && <Nav wishlistCount={wishlist.length} />}
          <div className={!showSplash ? 'page-entering' : ''}>
            <main style={{paddingTop: page === 'home' ? '0' : '0'}}>
              {page === 'home' && <HomePage wishlist={wishlist} onWishlistToggle={handleWishlistToggle} onToast={showToast} />}
              {page === 'browse' && <BrowsePage wishlist={wishlist} onWishlistToggle={handleWishlistToggle} />}
              {page === 'listing' && <ListingDetailPage id={listingId} wishlist={wishlist} onWishlistToggle={handleWishlistToggle} onToast={showToast} />}
              {page === 'booking' && <BookingPage listingId={bookingId} searchParams={bookingSearch} />}
              {page === 'list' && <ListPage />}
              {page === 'trade' && <TradePage />}
              {page === 'dashboard' && <DashboardPage />}
              {page === 'admin' && <AdminPage />}
            </main>
          </div>
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuthProvider><App /></AuthProvider>);
  </script>
  <script>
    // Scroll Reveal
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
    function initReveal() {
      document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    }
    initReveal();
    new MutationObserver(initReveal).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
